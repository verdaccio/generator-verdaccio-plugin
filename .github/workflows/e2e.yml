name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Avoid running on draft PRs
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        plugin-type: [auth, storage, middleware, filter]
    services:
      verdaccio:
        image: verdaccio/verdaccio:6
        ports:
          - 4873:4873

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Use Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        run: npm i -g corepack@latest || corepack enable && corepack prepare pnpm@latest --activate
      - name: install
        run: pnpm install
      - name: build
        run: pnpm build
      - name: login
        run: npx npm-cli-login -u test -p 1234 -e test@domain.test -r http://localhost:4873
      - name: pre-release
        run: npm version patch --no-git-tag-version
      - name: publish
        run: pnpm publish --registry http://localhost:4873 --no-git-checks
      - name: install yeoman
        run: npm install -g yo
      - name: install generator
        run: npm install -g generator-verdaccio-plugin --registry http://localhost:4873
      - name: generate ${{ matrix.plugin-type }} plugin
        run: node e2e/run-generator.mjs ${{ matrix.plugin-type }}
      - name: install generated plugin deps
        working-directory: verdaccio-test-plugin
        run: npm install
      - name: build generated plugin
        working-directory: verdaccio-test-plugin
        run: npx tsc
