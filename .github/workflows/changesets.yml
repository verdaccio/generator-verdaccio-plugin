name: Changesets

on:
  schedule:
    - cron: '0 0 * * *'

  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  CI: true
  PNPM_CACHE_FOLDER: .pnpm-store
  NPM_CONFIG_PROVENANCE: 'true'

jobs:
  # Open/refresh the "build: release packages" version PR from changesets.
  # Runs freely on every push/cron (no environment gate, no publish).
  version:
    timeout-minutes: 14
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.repository == 'verdaccio/generator-verdaccio-plugin'
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      - name: install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: install dependencies
        run: pnpm install
      - name: test
        run: pnpm test
      - name: create versions
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          version: pnpm ci:version
          commit: 'build: release packages'
          title: 'build: release packages'
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_RELEASE_TOKEN }}

  # Publish to npm once the version PR has been merged (no changesets left).
  # Gated by the `npm` environment, which requires manual approval.
  # Skipped on the daily cron so it never nags when there is nothing to publish.
  publish:
    needs: version
    if: needs.version.outputs.hasChangesets == 'false' && github.event_name != 'schedule'
    timeout-minutes: 14
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      - name: install pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack install
      - name: install dependencies
        run: pnpm install
      - name: test
        run: pnpm test
      - name: publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          publish: pnpm ci:publish
          createGithubReleases: true
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_RELEASE_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
